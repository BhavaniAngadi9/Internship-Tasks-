<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow - Interactive To-Do App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }

      .glass {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .task-item {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        animation: slideIn 0.3s ease-out;
      }

      .task-item:hover {
        transform: translateX(4px);
      }

      .task-item.completed {
        opacity: 0.6;
      }

      .task-item.completed .task-text {
        text-decoration: line-through;
        color: #9ca3af;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideOut {
        to {
          opacity: 0;
          transform: translateX(100%);
        }
      }

      .task-item.removing {
        animation: slideOut 0.3s ease-out forwards;
      }

      .checkbox-wrapper input:checked + div {
        background: #10b981;
        border-color: #10b981;
      }

      .checkbox-wrapper input:checked + div svg {
        display: block;
      }

      .priority-high {
        border-left: 4px solid #ef4444;
      }
      .priority-medium {
        border-left: 4px solid #f59e0b;
      }
      .priority-low {
        border-left: 4px solid #10b981;
      }

      .filter-btn.active {
        background: #667eea;
        color: white;
      }

      /* Custom Scrollbar */
      .task-container::-webkit-scrollbar {
        width: 6px;
      }

      .task-container::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 3px;
      }

      .task-container::-webkit-scrollbar-thumb {
        background: #c7c7c7;
        border-radius: 3px;
      }

      .task-container::-webkit-scrollbar-thumb:hover {
        background: #a0a0a0;
      }

      .empty-state {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.7;
        }
      }
    </style>
  </head>
  <body class="py-8 px-4">
    <div class="max-w-2xl mx-auto">
      <!-- Header -->
      <div class="text-center mb-8 text-white">
        <h1 class="text-4xl font-bold mb-2">
          <i class="fas fa-check-double mr-3"></i>TaskFlow
        </h1>
        <p class="opacity-90">Stay organized, get things done</p>
      </div>

      <!-- Main App Container -->
      <div class="glass rounded-3xl shadow-2xl overflow-hidden">
        <!-- Input Section -->
        <div class="p-6 border-b border-gray-200 bg-white">
          <div class="flex gap-3 mb-3">
            <input
              type="text"
              id="taskInput"
              placeholder="What needs to be done?"
              class="flex-1 px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:outline-none transition-colors text-gray-700 placeholder-gray-400"
              onkeypress="handleEnter(event)"
            />
            <select
              id="prioritySelect"
              class="px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:outline-none bg-white text-gray-700 cursor-pointer"
            >
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
            <button
              onclick="addTask()"
              class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold transition-all transform hover:scale-105 active:scale-95 shadow-lg hover:shadow-xl"
            >
              <i class="fas fa-plus"></i>
            </button>
          </div>
          <div class="flex gap-2 text-sm">
            <span class="text-gray-500 flex items-center gap-1"
              ><div class="w-3 h-3 rounded-full bg-red-500"></div>
              High</span
            >
            <span class="text-gray-500 flex items-center gap-1"
              ><div class="w-3 h-3 rounded-full bg-yellow-500"></div>
              Medium</span
            >
            <span class="text-gray-500 flex items-center gap-1"
              ><div class="w-3 h-3 rounded-full bg-green-500"></div>
              Low</span
            >
          </div>
        </div>

        <!-- Filter Tabs -->
        <div class="flex border-b border-gray-200 bg-gray-50">
          <button
            onclick="setFilter('all')"
            id="filter-all"
            class="filter-btn active flex-1 py-3 text-sm font-medium text-gray-600 hover:text-gray-800 transition-colors"
          >
            All
            <span
              id="count-all"
              class="ml-1 text-xs bg-gray-200 px-2 py-0.5 rounded-full"
              >0</span
            >
          </button>
          <button
            onclick="setFilter('active')"
            id="filter-active"
            class="filter-btn flex-1 py-3 text-sm font-medium text-gray-600 hover:text-gray-800 transition-colors"
          >
            Active
            <span
              id="count-active"
              class="ml-1 text-xs bg-gray-200 px-2 py-0.5 rounded-full"
              >0</span
            >
          </button>
          <button
            onclick="setFilter('completed')"
            id="filter-completed"
            class="filter-btn flex-1 py-3 text-sm font-medium text-gray-600 hover:text-gray-800 transition-colors"
          >
            Completed
            <span
              id="count-completed"
              class="ml-1 text-xs bg-gray-200 px-2 py-0.5 rounded-full"
              >0</span
            >
          </button>
        </div>

        <!-- Task List -->
        <div
          class="task-container max-h-96 overflow-y-auto bg-gray-50"
          id="taskList"
        >
          <!-- Tasks will be inserted here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden py-12 text-center bg-gray-50">
          <div class="text-6xl mb-4 opacity-30">📝</div>
          <p class="text-gray-500 text-lg">No tasks yet. Add one above!</p>
        </div>

        <!-- Footer Stats -->
        <div
          class="p-4 bg-white border-t border-gray-200 flex justify-between items-center text-sm text-gray-600"
        >
          <span id="itemsLeft">0 items left</span>
          <button
            onclick="clearCompleted()"
            id="clearCompletedBtn"
            class="text-red-500 hover:text-red-700 font-medium transition-colors hidden"
          >
            Clear Completed
          </button>
        </div>
      </div>

      <!-- Storage Notice -->
      <div class="mt-4 text-center text-white/80 text-sm">
        <i class="fas fa-info-circle mr-1"></i>
        Tasks are saved automatically to your browser's local storage
      </div>
    </div>

    <script>
      // Task Manager Class
      class TaskManager {
        constructor() {
          this.tasks = this.loadTasks();
          this.filter = "all";
          this.init();
        }

        init() {
          this.render();
          this.updateStats();
        }

        loadTasks() {
          try {
            const stored = localStorage.getItem("taskflow_tasks");
            return stored ? JSON.parse(stored) : [];
          } catch (e) {
            console.warn("Local storage not available:", e);
            return [];
          }
        }

        saveTasks() {
          try {
            localStorage.setItem("taskflow_tasks", JSON.stringify(this.tasks));
          } catch (e) {
            console.warn("Could not save to local storage:", e);
          }
        }

        addTask(text, priority = "medium") {
          const task = {
            id: Date.now(),
            text: text.trim(),
            completed: false,
            priority: priority,
            createdAt: new Date().toISOString(),
          };
          this.tasks.unshift(task);
          this.saveTasks();
          this.render();
          this.updateStats();
          return task;
        }

        toggleTask(id) {
          const task = this.tasks.find((t) => t.id === id);
          if (task) {
            task.completed = !task.completed;
            this.saveTasks();
            this.render();
            this.updateStats();
          }
        }

        deleteTask(id) {
          // Add removing animation class first
          const element = document.querySelector(`[data-task-id="${id}"]`);
          if (element) {
            element.classList.add("removing");
            setTimeout(() => {
              this.tasks = this.tasks.filter((t) => t.id !== id);
              this.saveTasks();
              this.render();
              this.updateStats();
            }, 300);
          } else {
            this.tasks = this.tasks.filter((t) => t.id !== id);
            this.saveTasks();
            this.render();
            this.updateStats();
          }
        }

        clearCompleted() {
          this.tasks = this.tasks.filter((t) => !t.completed);
          this.saveTasks();
          this.render();
          this.updateStats();
        }

        setFilter(filter) {
          this.filter = filter;
          // Update UI
          document.querySelectorAll(".filter-btn").forEach((btn) => {
            btn.classList.remove("active");
          });
          document.getElementById(`filter-${filter}`).classList.add("active");
          this.render();
        }

        getFilteredTasks() {
          switch (this.filter) {
            case "active":
              return this.tasks.filter((t) => !t.completed);
            case "completed":
              return this.tasks.filter((t) => t.completed);
            default:
              return this.tasks;
          }
        }

        updateStats() {
          const total = this.tasks.length;
          const active = this.tasks.filter((t) => !t.completed).length;
          const completed = this.tasks.filter((t) => t.completed).length;

          document.getElementById("count-all").textContent = total;
          document.getElementById("count-active").textContent = active;
          document.getElementById("count-completed").textContent = completed;
          document.getElementById("itemsLeft").textContent =
            `${active} item${active !== 1 ? "s" : ""} left`;

          const clearBtn = document.getElementById("clearCompletedBtn");
          if (completed > 0) {
            clearBtn.classList.remove("hidden");
          } else {
            clearBtn.classList.add("hidden");
          }
        }

        render() {
          const container = document.getElementById("taskList");
          const emptyState = document.getElementById("emptyState");
          const filteredTasks = this.getFilteredTasks();

          if (filteredTasks.length === 0) {
            container.innerHTML = "";
            emptyState.classList.remove("hidden");
            return;
          }

          emptyState.classList.add("hidden");
          container.innerHTML = filteredTasks
            .map((task) => this.createTaskHTML(task))
            .join("");
        }

        createTaskHTML(task) {
          const priorityColors = {
            high: "priority-high",
            medium: "priority-medium",
            low: "priority-low",
          };

          const priorityLabels = {
            high: '<span class="text-xs text-red-600 font-medium ml-2">HIGH</span>',
            medium:
              '<span class="text-xs text-yellow-600 font-medium ml-2">MED</span>',
            low: '<span class="text-xs text-green-600 font-medium ml-2">LOW</span>',
          };

          return `
                    <div class="task-item ${task.completed ? "completed" : ""} ${priorityColors[task.priority]} bg-white border-b border-gray-100 p-4 flex items-center gap-3 group" data-task-id="${task.id}">
                        <label class="checkbox-wrapper cursor-pointer relative flex items-center">
                            <input type="checkbox" class="sr-only" ${task.completed ? "checked" : ""} onchange="taskManager.toggleTask(${task.id})">
                            <div class="w-6 h-6 border-2 border-gray-300 rounded-lg flex items-center justify-center transition-all hover:border-indigo-400">
                                <svg class="w-4 h-4 text-white hidden pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                        </label>
                        
                        <div class="flex-1 min-w-0">
                            <p class="task-text text-gray-800 font-medium truncate">${this.escapeHtml(task.text)}</p>
                            <div class="flex items-center mt-0.5">
                                <span class="text-xs text-gray-400">${this.formatDate(task.createdAt)}</span>
                                ${priorityLabels[task.priority]}
                            </div>
                        </div>

                        <button 
                            onclick="taskManager.deleteTask(${task.id})" 
                            class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all opacity-0 group-hover:opacity-100 focus:opacity-100"
                            title="Delete task"
                        >
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
        }

        escapeHtml(text) {
          const div = document.createElement("div");
          div.textContent = text;
          return div.innerHTML;
        }

        formatDate(isoString) {
          const date = new Date(isoString);
          const now = new Date();
          const diffMs = now - date;
          const diffMins = Math.floor(diffMs / 60000);
          const diffHours = Math.floor(diffMs / 3600000);
          const diffDays = Math.floor(diffMs / 86400000);

          if (diffMins < 1) return "Just now";
          if (diffMins < 60) return `${diffMins}m ago`;
          if (diffHours < 24) return `${diffHours}h ago`;
          if (diffDays < 7) return `${diffDays}d ago`;
          return date.toLocaleDateString();
        }
      }

      // Initialize Task Manager
      const taskManager = new TaskManager();

      // Global Functions
      function addTask() {
        const input = document.getElementById("taskInput");
        const prioritySelect = document.getElementById("prioritySelect");
        const text = input.value.trim();

        if (!text) {
          input.focus();
          input.classList.add("ring-2", "ring-red-400");
          setTimeout(
            () => input.classList.remove("ring-2", "ring-red-400"),
            200,
          );
          return;
        }

        taskManager.addTask(text, prioritySelect.value);
        input.value = "";
        input.focus();
      }

      function handleEnter(event) {
        if (event.key === "Enter") {
          addTask();
        }
      }

      function setFilter(filter) {
        taskManager.setFilter(filter);
      }

      function clearCompleted() {
        if (confirm("Are you sure you want to clear all completed tasks?")) {
          taskManager.clearCompleted();
        }
      }

      // Focus input on load
      document.getElementById("taskInput").focus();
    </script>
  </body>
</html>
